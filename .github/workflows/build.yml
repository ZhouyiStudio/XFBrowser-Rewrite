name: XFBrowser Build (Firefox)

on:
  workflow_dispatch:
  push:
    branches: [master, main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clone mozilla-central
        uses: actions/checkout@v4
        with:
          repository: mozilla/gecko-dev
          path: firefox-src
          fetch-depth: 1

      - name: Cache Firefox obj directory
        uses: actions/cache@v4
        with:
          path: firefox-src\obj-x64-release
          key: firefox-obj-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            firefox-obj-${{ runner.os }}-

      - name: Install MozillaBuild
        shell: pwsh
        run: |
          $exe = "$env:TEMP\MozillaBuildSetup.exe"
          curl.exe -sL -o $exe "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
          if (!(Test-Path $exe)) { throw "Download failed" }
          Start-Process $exe -ArgumentList "/S" -Wait
          Remove-Item $exe -Force

      - name: Patch pyyaml pin (workaround pip strict resolver)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -File "firefox-src" -Exclude '*.pyc' | Select-String -Pattern "pyyaml==6\.0\.2" -ErrorAction SilentlyContinue | ForEach-Object { $_.Path }
          if ($files) {
            $files | ForEach-Object { (Get-Content $_) -replace "pyyaml==6\.0\.2", "pyyaml==6.0.3" | Set-Content $_ }
            echo "Patched pyyaml in: $($files -join ', ')"
          } else { echo "pyyaml==6.0.2 not found (may be already patched)" }

      - name: Write mozconfig
        shell: pwsh
        run: |
          @"
          ac_add_options --enable-application=browser
          mk_add_options MOZ_OBJDIR=obj-x64-release
          mk_add_options AUTOCLOBBER=1
          ac_add_options --target=x86_64-pc-windows-msvc
          ac_add_options --disable-debug
          ac_add_options --enable-optimize
          ac_add_options --disable-clang-plugin
          "@ | Out-File -FilePath "firefox-src\mozconfig" -Encoding utf8

      - name: mach configure
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach configure 2>&1

      - name: mach build
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach build 2>&1

      - name: mach package
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach package 2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XFBrowser-firefox-x64
          path: firefox-src\obj-x64-release\dist\firefox
          retention-days: 14
