name: XFBrowser Build (Firefox)

on:
  workflow_dispatch:
  push:
    branches: [master, main]

env:
  PYTHON_VERSION: '3.11'
  SCCACHE_GHA_ENABLED: 'true'

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Rust (with sccache)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0

      - name: Clone mozilla-central
        uses: actions/checkout@v4
        with:
          repository: mozilla/gecko-dev
          path: firefox-src
          fetch-depth: 1

      - name: Install MozillaBuild
        shell: pwsh
        run: |
          $exe = "$env:TEMP\MozillaBuildSetup.exe"
          curl.exe -sL -o $exe "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
          if (!(Test-Path $exe)) { throw "Download failed" }
          Start-Process $exe -ArgumentList "/S" -Wait
          Remove-Item $exe -Force

      - name: Patch pyyaml pin
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -File "firefox-src" | Select-String -Pattern "pyyaml==6\.0\.2" | ForEach-Object { $_.Path }
          if ($files) {
            $files | ForEach-Object { (Get-Content $_) -replace "pyyaml==6\.0\.2", "pyyaml==6.0.3" | Set-Content $_ }
          }

      - name: Write mozconfig
        shell: pwsh
        run: |
          @"
          ac_add_options --enable-application=browser
          mk_add_options MOZ_OBJDIR=obj-x64-release
          ac_add_options --target=x86_64-pc-windows-msvc
          ac_add_options --disable-debug
          ac_add_options --enable-optimize
          ac_add_options --disable-clang-plugin
          ac_add_options --disable-crashreporter
          ac_add_options --disable-updater
          ac_add_options --disable-parental-controls
          ac_add_options --disable-tests
          export CC="sccache clang-cl"
          export CXX="sccache clang-cl"
          export RUSTC_WRAPPER=sccache
          "@ | Out-File -FilePath "firefox-src\mozconfig" -Encoding utf8

      - name: mach configure
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach configure 2>&1

      - name: mach build
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach build 2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XFBrowser-firefox-x64
          path: firefox-src\obj-x64-release\dist\firefox
          retention-days: 14
