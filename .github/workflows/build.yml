# ============================================================
# XFBrowser CI Build - Multi-Job Pipeline
# Platform: Windows x64 Release (official sources)
# Jobs: setup (clone + patch + cache) -> build (gn gen + ninja)
# ============================================================
name: XFBrowser Build

on:
  workflow_dispatch:
    inputs:
      chromium_ref:
        description: Chromium tag or branch
        required: false
        default: '128.0.6613.84'
  push:
    branches: [master, main]

env:
  CHROMIUM_REF: ${{ github.event.inputs.chromium_ref || '128.0.6613.84' }}
  CACHE_KEY: xf-chromium-${{ github.event.inputs.chromium_ref || '128.0.6613.84' }}
  OUT_DIR: chromium-src\out\x64_Release_XFBrowser

jobs:
  # ==================== Job 1: Setup ====================
  setup:
    runs-on: windows-2022
    outputs:
      cache_key: ${{ steps.cache_key.outputs.key }}

    steps:
      - name: Checkout XFBrowser
        uses: actions/checkout@v4

      - name: Disk space
        shell: pwsh
        run: Get-PSDrive C | Select-Object Used, Free

      - name: Set cache key
        id: cache_key
        shell: pwsh
        run: echo "key=$env:CACHE_KEY" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore cached Chromium source
        id: cache
        uses: actions/cache@v4
        with:
          path: chromium-src
          key: ${{ env.CACHE_KEY }}

      - name: Setup VS + depot_tools
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          git clone --depth 1 "https://chromium.googlesource.com/chromium/tools/depot_tools.git" depot_tools
          echo "${{ github.workspace }}\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath

      - name: Clone Chromium (shallow full checkout)
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch "$env:CHROMIUM_REF" `
            "https://chromium.googlesource.com/chromium/src.git" chromium-src
          Set-Location chromium-src
          # Init submodules needed by patches
          git submodule update --init --depth 1 `
            third_party/devtools-frontend/src 2>$null

      - name: Apply ungoogled-chromium patches
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-Location chromium-src
          $series = Get-Content "${{ github.workspace }}\patches\ungoogled-chromium-official\series"
          foreach ($line in $series) {
            $p = $line.Trim()
            if ($p -eq '' -or $p.StartsWith('#')) { continue }
            $path = "${{ github.workspace }}\patches\ungoogled-chromium-official\$p"
            git apply --ignore-whitespace --whitespace=fix $path
          }

      - name: Apply XFBrowser patches
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-Location chromium-src
          $dirs = @(
            "${{ github.workspace }}\patches\ungoogled-chromium",
            "${{ github.workspace }}\patches\fluent-ui",
            "${{ github.workspace }}\patches\privacy"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Get-ChildItem $d -Filter *.patch | ForEach-Object {
                git apply --ignore-whitespace --whitespace=fix $_.FullName 2>$null
              }
            }
          }

      - name: Generate GN args
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:OUT_DIR")) { New-Item -ItemType Directory -Path "$env:OUT_DIR" }
          @"
          target_os = "win"
          target_cpu = "x64"
          is_debug = false
          is_official_build = true
          is_component_build = false
          symbol_level = 0
          blink_symbol_level = 0
          v8_symbol_level = 0
          enable_nacl = false
          enable_remoting = false
          enable_hangout_services_extension = false
          enable_reading_list = false
          enable_widevine = false
          enable_media_remoting = false
          enable_plugin_install = false
          enable_reporting = false
          enable_service_discovery = false
          enable_vr = false
          enable_webvr = false
          enable_webxr = false
          enable_wifi_display = false
          disable_ftp_support = true
          disable_fieldtrial_config = true
          exclude_unwind_tables = true
          google_api_key = ""
          google_default_client_id = ""
          google_default_client_secret = ""
          treat_warnings_as_errors = false
          use_goma = false
          use_jumbo_build = true
          use_sysroot = false
          use_thin_lto = true
          optimize_for_size = true
          clang_use_chrome_plugins = false
          fieldtrial_testing_like_official = true
          enable_extensions = true
          disable_google_now = true
          enable_doj_standalone = false
          disable_gaia_services = true
          disable_dashboard = true
          "@ | Out-File -FilePath "$env:OUT_DIR\args.gn" -Encoding utf8

  # ==================== Job 2: Build (gen + build) ====================
  build:
    needs: setup
    runs-on: windows-2022

    steps:
      - name: Checkout XFBrowser
        uses: actions/checkout@v4

      - name: Setup VS + depot_tools
        shell: pwsh
        run: |
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          git clone --depth 1 "https://chromium.googlesource.com/chromium/tools/depot_tools.git" depot_tools
          echo "${{ github.workspace }}\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Restore cached Chromium source
        uses: actions/cache@v4
        with:
          path: chromium-src
          key: ${{ needs.setup.outputs.cache_key }}

      - name: GN gen
        shell: pwsh
        run: |
          Set-Location chromium-src
          gn gen "out\x64_Release_XFBrowser" --fail-on-unused-args

      - name: Build XFBrowser
        shell: pwsh
        run: |
          Set-Location chromium-src
          ninja -C "out\x64_Release_XFBrowser" -j ([Environment]::ProcessorCount) chrome

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: XFBrowser-x64-Release
          path: chromium-src\out\x64_Release_XFBrowser
          retention-days: 7
