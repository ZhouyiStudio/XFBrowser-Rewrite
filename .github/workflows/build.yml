name: XFBrowser Build (Firefox)

on:
  workflow_dispatch:
  push:
    branches: [master, main]

env:
  PYTHON_VERSION: '3.12'
  MOZILLABUILD: C:\mozilla-build

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached bootstrap
        id: cache-bootstrap
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\.mozbuild
            C:\mozilla-build
          key: xf-bootstrap-v1-${{ hashFiles('firefox-src/python/mozbuild/**') }}
          restore-keys: xf-bootstrap-v1-

      - name: Clone mozilla-central
        uses: actions/checkout@v4
        with:
          repository: mozilla/gecko-dev
          path: firefox-src
          fetch-depth: 1

      - name: Install MozillaBuild
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $exe = "$env:TEMP\MozillaBuildSetup.exe"
          curl.exe -sL -o $exe "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
          if (!(Test-Path $exe)) { throw "Download failed" }
          Start-Process $exe -ArgumentList "/S" -Wait
          Remove-Item $exe -Force

      - name: mach bootstrap
        if: steps.cache-bootstrap.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach bootstrap --application-choice=browser --no-system-changes 2>&1

      - name: Write mozconfig
        shell: pwsh
        run: |
          @"
          ac_add_options --enable-application=browser
          export MOZILLA_OFFICIAL=1
          mk_add_options MOZ_OBJDIR=obj-x64-release
          ac_add_options --target=x86_64-pc-windows-msvc
          ac_add_options --disable-debug
          ac_add_options --enable-optimize
          ac_add_options --enable-official-branding
          "@ | Out-File -FilePath "firefox-src\mozconfig" -Encoding utf8

      - name: mach configure
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach configure 2>&1

      - name: mach build
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach build 2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XFBrowser-firefox-x64
          path: firefox-src\obj-x64-release\dist\firefox
          retention-days: 14
