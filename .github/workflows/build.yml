name: XFBrowser Build (Firefox)

on:
  workflow_dispatch:
  push:
    branches: [master, main]

env:
  OUT_DIR: firefox-src\obj-x64-release

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout XFBrowser
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cached Firefox source
        id: cache
        uses: actions/cache@v4
        with:
          path: firefox-src
          key: xf-firefox-central-${{ github.sha }}

      - name: Clone Firefox (mozilla-central git mirror)
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 "https://github.com/mozilla/gecko.git" firefox-src
          Set-Location firefox-src
          git log -1 --oneline > "${{ github.workspace }}\firefox-version.txt"

      - name: Write mozconfig
        shell: pwsh
        run: |
          @"
          ac_add_options --enable-application=browser
          export MOZILLA_OFFICIAL=1
          mk_add_options MOZ_OBJDIR=obj-x64-release
          ac_add_options --target=x86_64-pc-windows-msvc
          ac_add_options --disable-debug
          ac_add_options --enable-optimize
          ac_add_options --enable-official-branding
          "@ | Out-File -FilePath "firefox-src\mozconfig" -Encoding utf8

      - name: Bootstrap build environment
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach bootstrap --application-choice=browser --no-system-changes 2>&1 | Out-Null

      - name: Build XFBrowser
        shell: pwsh
        run: |
          Set-Location firefox-src
          python mach build 2>&1 | Out-Null

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: XFBrowser-firefox-x64
          path: firefox-src\obj-x64-release\dist\firefox
          retention-days: 7
