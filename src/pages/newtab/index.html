<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>新标签页 - XFBrowser</title>
  <link rel="stylesheet" href="../../fluent-ui/css/fluent-tokens.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="ntp-bg-overlay"></div>

    <header class="ntp-header">
      <div class="ntp-header-top">
        <div class="ntp-weather" id="weather">
          <span class="ntp-weather-icon" id="weatherIcon">☀️</span>
          <span class="ntp-weather-temp" id="weatherTemp">--°C</span>
          <span class="ntp-weather-city" id="weatherCity">--</span>
        </div>
        <div class="ntp-header-actions">
          <button class="ntp-icon-btn" id="themeToggle" title="切换主题">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="9" r="4" stroke="currentColor" stroke-width="1.3"/>
              <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.3 3.3l1.4 1.4M13.3 13.3l1.4 1.4M3.3 14.7l1.4-1.4M13.3 4.7l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="ntp-icon-btn" id="settingsBtn" title="设置">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M9 1v2.5M9 14.5V17M1 9h2.5M14.5 9H17M3.3 3.3l1.8 1.8M12.9 12.9l1.8 1.8M3.3 14.7l1.8-1.8M12.9 5.1l1.8-1.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="ntp-greeting-section">
        <h1 class="ntp-greeting" id="greeting">你好</h1>
        <p class="ntp-time" id="currentTime"></p>
        <p class="ntp-date-full" id="currentDate"></p>
      </div>
    </header>

    <main class="ntp-main">
      <section class="ntp-search-section">
        <div class="ntp-search-container">
          <svg class="ntp-search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11.5 11.5L16 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input type="text" class="ntp-search-input" id="searchInput"
                 placeholder="搜索或输入网址" autofocus
                 autocomplete="off" spellcheck="false">
        </div>
        <div class="ntp-search-tips" id="searchTips"></div>
      </section>

      <section class="ntp-section">
        <div class="ntp-section-header">
          <h2>快捷访问</h2>
          <div class="ntp-section-actions">
            <button class="ntp-section-btn" id="addShortcut" title="添加快捷方式">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="ntp-section-btn ntp-section-btn-active" id="toggleEditShortcuts" title="编辑快捷方式">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M11 1l2 2-8 8-3 1 1-3 8-8z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="ntp-tiles" id="shortcuts"></div>
      </section>

      <section class="ntp-section ntp-quote-section">
        <div class="ntp-quote">
          <p class="ntp-quote-text" id="quoteText"></p>
          <p class="ntp-quote-author" id="quoteAuthor"></p>
        </div>
      </section>

      <section class="ntp-section" id="recentSection" style="display:none">
        <div class="ntp-section-header">
          <h2>最近关闭</h2>
          <button class="ntp-section-btn" id="clearRecent" title="清空">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 4h10M5 4V2.5A1.5 1.5 0 016.5 1h1A1.5 1.5 0 019 2.5V4M11 4v7.5A1.5 1.5 0 019.5 13h-5A1.5 1.5 0 013 11.5V4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="ntp-recent-list" id="recentList"></div>
      </section>
    </main>

    <footer class="ntp-footer">
      <div class="ntp-footer-links">
        <button class="ntp-footer-btn" data-action="settings">设置</button>
        <button class="ntp-footer-btn" data-action="history">历史记录</button>
        <button class="ntp-footer-btn" data-action="bookmarks">书签</button>
        <button class="ntp-footer-btn" data-action="downloads">下载</button>
        <button class="ntp-footer-btn" data-action="extensions">扩展</button>
      </div>
    </footer>
  </div>

  <div class="ntp-modal" id="settingsModal">
    <div class="ntp-modal-backdrop"></div>
    <div class="ntp-modal-content">
      <div class="ntp-modal-header">
        <h2>设置</h2>
        <button class="ntp-modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="ntp-modal-body">
        <div class="ntp-setting-group">
          <label>主题</label>
          <div class="ntp-theme-options" id="themeOptions">
            <button class="ntp-theme-option" data-theme="light">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="6" fill="currentColor"/>
              </svg>
              浅色
            </button>
            <button class="ntp-theme-option" data-theme="dark">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M17 12.5A7.5 7.5 0 017.5 3a7.5 7.5 0 109.5 9.5z" fill="currentColor"/>
              </svg>
              深色
            </button>
            <button class="ntp-theme-option" data-theme="system">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="3" width="16" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M7 17h6M10 14v3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              跟随系统
            </button>
          </div>
        </div>
        <div class="ntp-setting-group">
          <label>默认搜索引擎</label>
          <select id="settingsSearchEngine">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
            <option value="baidu">百度</option>
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="sogou">搜狗</option>
          </select>
        </div>
        <div class="ntp-setting-group">
          <label>背景</label>
          <div class="ntp-bg-options" id="bgOptions">
            <button class="ntp-bg-option" data-bg="gradient">
              <span class="ntp-bg-preview" style="background:linear-gradient(135deg, #e8f0fe, #f0f4ff)"></span>
              渐变
            </button>
            <button class="ntp-bg-option" data-bg="solid">
              <span class="ntp-bg-preview" style="background:#f5f5f5"></span>
              纯色
            </button>
            <button class="ntp-bg-option" data-bg="image">
              <span class="ntp-bg-preview" style="background:#333;display:flex;align-items:center;justify-content:center;color:white;font-size:16px">🖼</span>
              图片
            </button>
          </div>
          <div class="ntp-bg-image-input" id="bgImageInput" style="display:none">
            <input type="text" id="bgImageUrl" placeholder="输入图片URL" class="ntp-input">
            <button class="ntp-btn ntp-btn-sm" id="applyBgImage">应用</button>
          </div>
        </div>
        <div class="ntp-setting-group">
          <label>快捷方式</label>
          <div class="ntp-setting-row">
            <span>最多显示</span>
            <select id="shortcutCount">
              <option value="4">4 个</option>
              <option value="6">6 个</option>
              <option value="8" selected>8 个</option>
              <option value="12">12 个</option>
            </select>
          </div>
        </div>
        <div class="ntp-setting-group">
          <label>显示</label>
          <div class="ntp-setting-row">
            <span>名言</span>
            <label class="ntp-toggle">
              <input type="checkbox" id="showQuote" checked>
              <span class="ntp-toggle-slider"></span>
            </label>
          </div>
          <div class="ntp-setting-row">
            <span>最近关闭</span>
            <label class="ntp-toggle">
              <input type="checkbox" id="showRecent" checked>
              <span class="ntp-toggle-slider"></span>
            </label>
          </div>
          <div class="ntp-setting-row">
            <span>天气</span>
            <label class="ntp-toggle">
              <input type="checkbox" id="showWeather" checked>
              <span class="ntp-toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
      <div class="ntp-modal-footer">
        <button class="ntp-btn ntp-btn-secondary" id="resetSettings">恢复默认</button>
        <button class="ntp-btn ntp-btn-primary" id="saveSettings">保存</button>
      </div>
    </div>
  </div>

  <div class="ntp-modal" id="addShortcutModal">
    <div class="ntp-modal-backdrop"></div>
    <div class="ntp-modal-content ntp-modal-content-sm">
      <div class="ntp-modal-header">
        <h2>添加快捷方式</h2>
        <button class="ntp-modal-close" id="addShortcutClose">&times;</button>
      </div>
      <div class="ntp-modal-body">
        <div class="ntp-setting-group">
          <label>名称</label>
          <input type="text" id="shortcutName" class="ntp-input" placeholder="如：GitHub">
        </div>
        <div class="ntp-setting-group">
          <label>网址</label>
          <input type="text" id="shortcutUrl" class="ntp-input" placeholder="如：https://github.com">
        </div>
      </div>
      <div class="ntp-modal-footer">
        <button class="ntp-btn ntp-btn-secondary" id="addShortcutCancel">取消</button>
        <button class="ntp-btn ntp-btn-primary" id="addShortcutConfirm">添加</button>
      </div>
    </div>
  </div>

  <div class="ntp-toast" id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
